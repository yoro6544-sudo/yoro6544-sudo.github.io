<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Surprise Heart Full</title>
    <style>
        /* ตั้งค่าพื้นฐานและการจัดวาง */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #fce4ec; /* สีพื้นหลังชมพูอ่อน */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            /* ป้องกันการเลือก text บนมือถือเวลาแตะค้าง */
            -webkit-user-select: none;
            user-select: none;
        }

        /* คอนเทนเนอร์หลัก */
        .container {
            text-align: center;
            position: relative;
            z-index: 10;
            /* ป้องกันการกระตุกบนมือถือ */
            transform: translateZ(0);
        }

        /* การตั้งค่า SVG ของหัวใจ */
        .heart-svg {
            width: 180px; /* ปรับให้ใหญ่ขึ้นนิดหน่อยเพื่อให้เห็นชัดเจน */
            height: 180px;
            cursor: pointer;
            transform: scale(1);
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            -webkit-tap-highlight-color: transparent;
            touch-action: none; /* สำคัญ: บอก browser ว่าเราจะจัดการ touch event เอง */
        }

        .heart-svg:active {
            transform: scale(0.95);
        }

        /* ส่วนของเส้นขอบหัวใจ */
        .heart-stroke {
            fill: none;
            stroke: #ff1744;
            stroke-width: 20;
            stroke-linejoin: round; /* ทำให้มุมเชื่อมต่อมน */
            stroke-linecap: round;  /* ทำให้ปลายเส้นมน */
        }

        /* ส่วนของเนื้อสีที่จะเติมเต็ม (ใช้ Clip-path บังคับการแสดงผล) */
        .heart-fill {
            fill: #ff1744;
            clip-path: url(#fill-clip);
        }

        /* กรอบสี่เหลี่ยมที่ใช้เป็นตัวเลื่อนระดับน้ำสีแดง */
        #fill-rect {
            transition: y 0.1s linear;
        }

        /* ข้อความแนะนำ */
        .hint-text {
            margin-top: 10px;
            color: #880e4f;
            font-size: 1rem;
            opacity: 0.8;
            pointer-events: none;
        }

        /* -----------------------
           ส่วนของ Card (Popup)
           ----------------------- */
        .card-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.5s ease, visibility 0.5s;
            z-index: 20;
            backdrop-filter: blur(5px);
        }

        .card-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .card {
            background: white;
            width: 85%;
            max-width: 320px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            overflow: hidden;
            transform: translateY(50px) scale(0.8);
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            text-align: center;
        }

        .card-overlay.active .card {
            transform: translateY(0) scale(1);
        }

        .card-image {
            width: 100%;
            height: 220px;
            object-fit: cover;
            background-color: #ffebee;
        }

        .card-content {
            padding: 25px;
        }

        .card-title {
            margin: 0 0 10px 0;
            color: #d81b60;
            font-size: 1.6rem;
        }

        .card-desc {
            margin: 0 0 20px 0;
            color: #555;
            line-height: 1.6;
            font-size: 1rem;
        }

        .close-btn {
            background: linear-gradient(45deg, #ff1744, #ff4081);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(255, 23, 68, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .close-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 7px 20px rgba(255, 23, 68, 0.5);
        }

        .close-btn:active {
             transform: translateY(1px);
        }

    </style>
</head>
<body>

    <div class="container">
        <svg class="heart-svg" id="heartBtn" viewBox="-30 -30 572 572" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <clipPath id="fill-clip">
                    <rect id="fill-rect" x="-30" y="512" width="572" height="550" />
                </clipPath>
            </defs>

            <path class="heart-stroke" d="M462.3 62.6C407.5 15.9 326 24.3 275.7 76.2L256 96.5l-19.7-20.3C186.1 24.3 104.5 15.9 49.7 62.6c-62.8 53.6-66.1 149.8-9.9 207.9l193.5 199.8c12.5 12.9 32.8 12.9 45.3 0l193.5-199.8c56.3-58.1 53-154.3-9.8-207.9z" />
            
            <path class="heart-fill" d="M462.3 62.6C407.5 15.9 326 24.3 275.7 76.2L256 96.5l-19.7-20.3C186.1 24.3 104.5 15.9 49.7 62.6c-62.8 53.6-66.1 149.8-9.9 207.9l193.5 199.8c12.5 12.9 32.8 12.9 45.3 0l193.5-199.8c56.3-58.1 53-154.3-9.8-207.9z" />
        </svg>

        <p class="hint-text">กดค้างเพื่อเติมหัวใจ</p>
    </div>

    <div class="card-overlay" id="cardOverlay">
        <div class="card">
            <img src="https://scontent.fbkk22-2.fna.fbcdn.net/v/t39.30808-6/596688978_25113968888245200_980468165780621546_n.jpg?_nc_cat=106&ccb=1-7&_nc_sid=6ee11a&_nc_ohc=szTOjsTln4cQ7kNvwE6eLOC&_nc_oc=AdnDi78gRoKPdT30pUVz2GKXscXq-JcMlaxROIOFOz8X3tb62VlA_J4UsQR4R9KEWp_kGP-IuzIDxLxpiWafbcNy&_nc_zt=23&_nc_ht=scontent.fbkk22-2.fna&_nc_gid=14skjzDJLe5KcuVX_fS1Eg&oh=00_AfvouzunIiLZU2eh-hgM5-lClAkkiP478JHeMwQFulOnew&oe=69950FD3" alt="Love Image" class="card-image">
            <div class="card-content">
                <h2 class="card-title">Happy valentine's day</h2>
                <p class="card-desc">
                    รักเก่งมากๆนะ<br>
                    รักที่สุดเลย ขอบคุณที่อยู่กันมา<br>
                    อยู่ด้วยกันไปนานๆนะ ห้ามดื้อด้วย
                </p>
                <button class="close-btn" onclick="resetHeart()">ปิดหน้าต่าง</button>
            </div>
        </div>
    </div>

    <script>
        const heartBtn = document.getElementById('heartBtn');
        const fillRect = document.getElementById('fill-rect');
        const cardOverlay = document.getElementById('cardOverlay');
        
        let isHolding = false;
        let fillLevel = 0; // 0 ถึง 100
        let animationFrame;
        // ปรับความเร็วให้เหมาะสมกับมือถือมากขึ้น
        const fillSpeed = 1.8; 
        const drainSpeed = 3; 
        // จุดต่ำสุดของหัวใจอยู่ที่ประมาณ y=512 เราใช้ค่านี้เป็นฐาน
        const coordinateBase = 512; 

        // ฟังก์ชันป้องกัน Default event บนมือถือ
        function preventDefault(e) {
            e.preventDefault();
        }

        function startHolding(e) {
             if (e.cancelable) {
                 e.preventDefault();
             }
            if (fillLevel < 100 && !cardOverlay.classList.contains('active')) {
                isHolding = true;
                cancelAnimationFrame(animationFrame);
                updateFill();
            }
        }

        function stopHolding(e) {
            isHolding = false;
        }

        function updateFill() {
            if (isHolding) {
                if (fillLevel < 100) {
                    fillLevel += fillSpeed;
                    if (fillLevel >= 100) {
                        fillLevel = 100;
                        isHolding = false;
                        setTimeout(showCard, 100); // หน่วงนิดนึงก่อนโชว์การ์ด
                        return; 
                    }
                }
            } else {
                if (fillLevel > 0) {
                    fillLevel -= drainSpeed;
                    if (fillLevel < 0) fillLevel = 0;
                } else {
                    return; 
                }
            }

            // คำนวณค่า Y (512 คือว่าง, 0 คือเต็มโดยประมาณ)
            // เราเผื่อระยะด้านบนไว้ (จาก viewBox ติดลบ) ดังนั้นเมื่อเต็มมันจะเลย 0 ขึ้นไปนิดหน่อยซึ่งโอเค
            const currentY = coordinateBase - (coordinateBase * (fillLevel / 100));
            fillRect.setAttribute('y', currentY);

            animationFrame = requestAnimationFrame(updateFill);
        }

        function showCard() {
            cardOverlay.classList.add('active');
        }

        function resetHeart() {
            cardOverlay.classList.remove('active');
            // รอให้การ์ดปิดก่อนค่อยรีเซ็ตค่า
            setTimeout(() => {
                fillLevel = 0;
                fillRect.setAttribute('y', coordinateBase);
                isHolding = false;
            }, 300);
        }

        // Event Listeners (เพิ่ม options { passive: false } เพื่อให้ preventDefault ทำงานได้ดีบนมือถือ)
        heartBtn.addEventListener('mousedown', startHolding);
        heartBtn.addEventListener('touchstart', startHolding, { passive: false });

        document.addEventListener('mouseup', stopHolding);
        heartBtn.addEventListener('mouseleave', stopHolding);
        document.addEventListener('touchend', stopHolding);
        document.addEventListener('touchcancel', stopHolding);

        // ป้องกันการลาก หรือซูมโดยไม่ตั้งใจบนตัวหัวใจ
        heartBtn.addEventListener('touchmove', preventDefault, { passive: false });
        
    </script>
</body>
</html>
